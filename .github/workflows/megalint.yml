name: megalint

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  megalint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      # Floating tags kept intentionally so the megalinter job tracks the latest
      # scanner images/config; unpinned-uses suppressed per that decision.
      - uses: actions/checkout@v7 # zizmor: ignore[unpinned-uses]
        with:
          fetch-depth: 0
          persist-credentials: false

      # Persist the trivy/grype vulnerability DBs across runs (rebuilt weekly).
      - name: Compute cache week
        id: week
        run: echo "week=$(date -u '+%Y-W%V')" >> "$GITHUB_OUTPUT"

      - name: Restore vuln-db cache
        uses: actions/cache@v5 # zizmor: ignore[unpinned-uses]
        with:
          path: ~/.cache/megalint/vuln-db
          key: vuln-db-${{ runner.os }}-${{ steps.week.outputs.week }}
          restore-keys: |
            vuln-db-${{ runner.os }}-

      # Shared MegaLinter profile. Image pinned to an immutable composite tag
      # (repo release 0.2.0 wrapping upstream MegaLinter 9.6.0) for reproducible
      # scans — bump it together with the action ref. Full tree on main and the
      # weekly schedule; PR diff otherwise.
      - id: megalint
        uses: trevor-vaughan/megalint-config@v0.2.0 # zizmor: ignore[unpinned-uses]
        with:
          megalinter-image: ghcr.io/trevor-vaughan/megalinter-custom-flavor:0.2.0-ml9.6.0
          validate-all-codebase: ${{ github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
          vuln-cache-dir: ~/.cache/megalint/vuln-db

      - name: Upload MegaLinter reports
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@v7 # zizmor: ignore[unpinned-uses]
        with:
          name: megalinter-reports
          path: |
            ${{ steps.megalint.outputs.reports-dir }}
            mega-linter.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload SARIF to code scanning
        if: ${{ success() || failure() }}
        uses: github/codeql-action/upload-sarif@v4 # zizmor: ignore[unpinned-uses]
        with:
          sarif_file: ${{ steps.megalint.outputs.sarif-file }}
          category: megalint
