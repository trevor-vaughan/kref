name: release

on:
  push:
    tags: ["v*"]

# contents: write — create the GitHub Release
# id-token: write + attestations: write — Sigstore keyless build provenance
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      # cache: false — a tag-triggered release must not read a module cache a
      # branch build could have poisoned (zizmor cache-poisoning).
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false

      # syft on PATH for GoReleaser's `sboms` stanza
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Attest every released artifact (archives + SBOMs) via the digests
      # GoReleaser already wrote to checksums.txt. Verify a download with:
      #   gh attestation verify <artifact> --repo <owner>/kref
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-checksums: dist/checksums.txt
