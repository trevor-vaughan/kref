version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # `chore` prefix so dependency bumps are dropped from the release notes by
    # the `^chore:` filter in .goreleaser.yml.
    commit-message:
      prefix: chore
    groups:
      go-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
