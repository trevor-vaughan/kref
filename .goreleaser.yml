version: 2

project_name: kref

before:
  hooks:
    - go mod tidy

builds:
  - id: kref
    main: ./cmd/kref
    binary: kref
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{ .Version }}

archives:
  - id: kref
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

# SPDX SBOM per archive (syft; the release workflow puts it on PATH).
# SBOMs land in checksums.txt too, so the provenance attestation covers them.
sboms:
  - artifacts: archive

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  draft: false
