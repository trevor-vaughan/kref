    kref-ingest:
      files: git diff-tree --no-commit-id --name-only -r HEAD -- docs/superpowers/plans specs .specify openspec
      glob: "*.md"
      run: /home/tvaughan/Projects/LLM_Git_Artifacts/bin/kref ingest --skip-missing {files}
