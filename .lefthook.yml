    kref-sync-pull:
      run: /home/tvaughan/Projects/LLM_Git_Artifacts/bin/kref sync pull
post-checkout:
  commands:
    kref-sync-pull:
      run: /home/tvaughan/Projects/LLM_Git_Artifacts/bin/kref sync pull
pre-push:
  commands:
    kref-sync-push:
      run: /home/tvaughan/Projects/LLM_Git_Artifacts/bin/kref sync push
post-commit:
